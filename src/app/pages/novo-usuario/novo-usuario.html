<div class="signup-container">
  <div class="signup-card">
    <h1>Criar Conta</h1>
    <p class="signup-subtitle">Pokémon TCG - Novo Usuário</p>

    @if (mensagem) {
      <p class="mensagemAvisoUser">{{ mensagem }}</p>
    }

    <form (submit)="criarUsuario()" class="signup-form">
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input
          type="text"
          id="nome"
          [(ngModel)]="nome"
          name="nome"
          placeholder="Digite seu nome completo"
          class="form-input"
          required />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="seu@email.com"
          class="form-input"
          required />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          [(ngModel)]="senha"
          name="senha"
          placeholder="••••••••"
          class="form-input"
          required />
      </div>

      <button type="submit" class="btn-signup">Cadastrar</button>
    </form>

    <p class="signup-footer">
      Já tem conta?
      <a routerLink="/" class="link-voltar">Faça login aqui</a>
    </p>
  </div>
</div>
